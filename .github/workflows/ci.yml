name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (ruff, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: telemetry
          POSTGRES_PASSWORD: telemetry
          POSTGRES_DB: telemetry_hub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U telemetry -d telemetry_hub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://telemetry:telemetry@localhost:5432/telemetry_hub
      TEST_DATABASE_URL: postgresql+asyncpg://telemetry:telemetry@localhost:5432/telemetry_hub_test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest

  frontend:
    name: Frontend (typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
